---
# code: language=ansible

- name: Add folder for Docker files
  ansible.builtin.file:
    path: "{{ docker_path }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"

- name: Install Docker
  community.general.pacman:
    name:
      - docker
      - docker-compose
      - fuse-overlayfs
    state: present
    update_cache: true

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ username }}"
    groups: docker
    append: true

- name: Enable Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add docker-cleanup script
  ansible.builtin.copy:
    src: docker/docker-cleanup.sh
    dest: /usr/local/bin/
    owner: root
    group: root
    mode: "0755"

- name: Copy docker-cleanup timer to systemd folder
  ansible.builtin.copy:
    src: docker/docker-cleanup.timer
    dest: /etc/systemd/system/
    owner: root
    group: root
    mode: "0644"

- name: Copy docker-cleanup service to systemd folder
  ansible.builtin.copy:
    src: docker/docker-cleanup.service
    dest: /etc/systemd/system/
    owner: root
    group: root
    mode: "0644"

- name: Enable docker-cleanup timer
  ansible.builtin.systemd:
    unit: docker-cleanup.timer
    daemon_reload: true
    state: started
    enabled: true
